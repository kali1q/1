<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>在线刷题</title>

<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f9;
}

.container{
max-width:900px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

#progress{
margin-bottom:20px;
color:#666;
}

.option{
border:1px solid #ddd;
padding:12px;
margin:10px 0;
cursor:pointer;
border-radius:6px;
}

.option:hover{
background:#f0f0f0;
}

.correct{
background:#c8f7c5;
}

.wrong{
background:#f7c5c5;
}

button{
margin-top:15px;
padding:8px 15px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>在线刷题</h1>

<div id="progress"></div>

<div id="quiz"></div>

<button onclick="next()">下一题</button>

</div>

<script>

let questions=[]
let index=0

fetch("nisp.docx")
.then(res=>res.arrayBuffer())
.then(buffer=>{

mammoth.extractRawText({arrayBuffer:buffer})
.then(result=>{

parseQuestions(result.value)

show()

})

})

function parseQuestions(text){

let blocks=text.split("正确答案是")

blocks.forEach(b=>{

let title=b.match(/(.*)A、/s)

if(!title) return

let A=b.match(/A、(.*)/)
let B=b.match(/B、(.*)/)
let C=b.match(/C、(.*)/)
let D=b.match(/D、(.*)/)

let ans=b.match(/：([A-D])/)

if(!ans) return

questions.push({

question:title[1].trim(),

A:A?A[1].trim():"",
B:B?B[1].trim():"",
C:C?C[1].trim():"",
D:D?D[1].trim():"",

answer:ans[1]

})

})

}

function show(){

let q=questions[index]

document.getElementById("progress").innerHTML=
"第 "+(index+1)+" 题 / 共 "+questions.length+" 题"

let html=`

<h3>${q.question}</h3>

<div class="option" onclick="check('A',this)">A、${q.A}</div>
<div class="option" onclick="check('B',this)">B、${q.B}</div>
<div class="option" onclick="check('C',this)">C、${q.C}</div>
<div class="option" onclick="check('D',this)">D、${q.D}</div>

`

document.getElementById("quiz").innerHTML=html

}

function check(ans,el){

let q=questions[index]

let options=document.querySelectorAll(".option")

options.forEach(o=>o.onclick=null)

if(ans==q.answer){

el.classList.add("correct")

setTimeout(()=>{

next()

},500)

}else{

el.classList.add("wrong")

options.forEach(o=>{
if(o.innerText.startsWith(q.answer)){
o.classList.add("correct")
}
})

}

}

function next(){

index++

if(index>=questions.length){

document.getElementById("quiz").innerHTML="<h2>全部做完 🎉</h2>"
return

}

show()

}

</script>

</body>
</html>
