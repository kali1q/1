<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TXT题库刷题系统</title>
<style>
body { max-width:800px;margin:40px auto;font-family:Arial;}
.option{display:block;border:1px solid #ccc;padding:8px;margin:5px 0;cursor:pointer}
.correct{background:#c8f7c5}
.wrong{background:#f7c5c5}
</style>
</head>
<body>

<h2>上传TXT题库</h2>
<input type="file" id="fileInput" accept=".txt">
<div id="progress"></div>
<div id="question"></div>
<div id="options"></div>
<button onclick="prev()">上一题</button>
<button onclick="next()">下一题</button>

<script>
let questions = [];
let current = 0;

document.getElementById("fileInput").addEventListener("change", function(e){
    const reader = new FileReader();
    reader.onload = function(){
        parseQuestions(this.result);
        loadQuestion();
    }
    reader.readAsText(e.target.files[0], "utf-8");
});

function parseQuestions(text){
    const blocks = text.split(/\n(?=\d+、)/);  // 按题号分块
    questions = [];

    blocks.forEach(block=>{
        const match = block.match(/(\d+)、([\s\S]*?)（([A-D])）[\s\S]*?A、([\s\S]*?)\nB、([\s\S]*?)\nC、([\s\S]*?)\nD、([\s\S]*)/);
        if(match){
            questions.push({
                title: match[2].trim(),
                options:{
                    A: match[4].trim(),
                    B: match[5].trim(),
                    C: match[6].trim(),
                    D: match[7].trim()
                },
                answer: match[3]
            });
        }
    });
}

function loadQuestion(){
    if(questions.length==0) return;
    const q = questions[current];
    document.getElementById("progress").innerText =
        `第 ${current+1} 题 / 共 ${questions.length} 题`;
    document.getElementById("question").innerText = q.title;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML="";

    for(let key in q.options){
        const div = document.createElement("div");
        div.className="option";
        div.innerText = key+"、"+q.options[key];
        div.onclick=()=>check(div,key);
        optionsDiv.appendChild(div);
    }
}

function check(el,selected){
    const correct = questions[current].answer;
    const opts = document.querySelectorAll(".option");
    opts.forEach(o=>{
        o.onclick=null;
        if(o.innerText.startsWith(correct)){
            o.classList.add("correct");
        }
    });
    if(selected!==correct){
        el.classList.add("wrong");
    }
}

function next(){
    if(current<questions.length-1){
        current++;
        loadQuestion();
    }
}

function prev(){
    if(current>0){
        current--;
        loadQuestion();
    }
}
</script>

</body>
</html>
