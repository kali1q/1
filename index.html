<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>刷题系统</title>

<style>
body{
    max-width:900px;
    margin:40px auto;
    font-family:Arial;
    padding:20px;
}
h2{margin-bottom:10px}
#progress{margin-bottom:10px;font-weight:bold}
.option{
    border:1px solid #ccc;
    padding:10px;
    margin:8px 0;
    cursor:pointer;
    border-radius:6px;
    user-select:none;
}
.option:hover{background:#f0f0f0}
.correct{background:#c8f7c5 !important}
.wrong{background:#f7c5c5 !important}
button{
    padding:8px 14px;
    margin:5px;
}
#stats{
    margin-top:15px;
    padding:10px;
    background:#f8f8f8;
}
</style>
</head>

<body>

<h2>刷题系统</h2>

<div id="progress"></div>
<div id="question"></div>
<div id="options"></div>

<div>
<button onclick="prev()">上一题</button>
<button onclick="next()">下一题</button>
<button onclick="toggleRandom()">随机模式</button>
<button onclick="showWrong()">错题模式</button>
<button onclick="resetProgress()">重置记录</button>
</div>

<div id="stats"></div>

<script>

let questions = [];
let current = 0;
let randomMode = false;
let wrongList = [];
let selectedAnswers = [];

let stats = {
    correct:0,
    wrong:0
};

fetch("题库_整理版.txt")
.then(res => res.text())
.then(text => {
    parseQuestions(text);
    loadSavedProgress();
    loadQuestion();
});

function parseQuestions(text){

    const blocks = text.split(/\n(?=\d+\.)/);

    blocks.forEach(block => {

        let content = block.trim();
        if(content.length < 5) return;

        // 提取答案（支持 答案：A 或 （A））
        let answer = "";
        let ansMatch = content.match(/答案[:：]\s*([A-D]+)/);
        if(ansMatch){
            answer = ansMatch[1];
        } else {
            let bracketMatch = content.match(/（([A-D]+)）/);
            if(bracketMatch){
                answer = bracketMatch[1];
            }
        }

        // 提取选项（支持同行 / 分行 / A、 或 A.）
        let options = {};
        let optionRegex = /([A-D])[\.\、]\s*(.*?)(?=\s*[A-D][\.\、]\s*|$)/g;

        let match;
        while((match = optionRegex.exec(content)) !== null){
            options[match[1]] = match[2].trim();
        }

        // 删除题号
        content = content.replace(/^\d+\./,"");

        // 删除选项
        content = content.replace(optionRegex,"");

        // 删除答案
        content = content.replace(/答案[:：]\s*[A-D]+/,"");
        content = content.replace(/（[A-D]+）/,"");

        let title = content.trim();

        if(title && Object.keys(options).length > 0){
            questions.push({title, options, answer});
        }
    });
}

function loadQuestion(){

    if(questions.length === 0) return;

    if(randomMode){
        current = Math.floor(Math.random() * questions.length);
    }

    selectedAnswers = [];

    const q = questions[current];

    document.getElementById("progress").innerText =
        `第 ${current+1} 题 / 共 ${questions.length} 题`;

    document.getElementById("question").innerText = q.title;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    for(let key in q.options){
        const div = document.createElement("div");
        div.className = "option";
        div.innerText = key + ". " + q.options[key];
        div.onclick = ()=>selectOption(div,key);
        optionsDiv.appendChild(div);
    }

    updateStats();
}

function selectOption(el,key){

    const q = questions[current];

    if(q.answer.length > 1){
        // 多选
        if(selectedAnswers.includes(key)){
            selectedAnswers = selectedAnswers.filter(k=>k!==key);
            el.style.background="";
        } else {
            selectedAnswers.push(key);
            el.style.background="#ddd";
        }
    } else {
        // 单选
        selectedAnswers=[key];
        checkAnswer();
    }
}

function checkAnswer(){

    const q = questions[current];
    const correct = q.answer;

    const opts = document.querySelectorAll(".option");

    opts.forEach(o=>{
        o.onclick=null;
        if(correct.includes(o.innerText[0])){
            o.classList.add("correct");
        }
    });

    if(selectedAnswers.sort().join("") === correct.split("").sort().join("")){
        stats.correct++;
    } else {
        stats.wrong++;
        wrongList.push(current);
        opts.forEach(o=>{
            if(selectedAnswers.includes(o.innerText[0]) && !correct.includes(o.innerText[0])){
                o.classList.add("wrong");
            }
        });
    }

    saveProgress();
    updateStats();
}

function next(){
    if(current < questions.length-1){
        current++;
        loadQuestion();
    }
}

function prev(){
    if(current > 0){
        current--;
        loadQuestion();
    }
}

function toggleRandom(){
    randomMode = !randomMode;
    alert("随机模式：" + (randomMode?"开启":"关闭"));
}

function showWrong(){
    if(wrongList.length === 0){
        alert("暂无错题");
        return;
    }
    current = wrongList.shift();
    loadQuestion();
}

function updateStats(){

    let total = stats.correct + stats.wrong;
    let rate = total ? ((stats.correct/total)*100).toFixed(1) : 0;

    document.getElementById("stats").innerHTML =
        `已做：${total} 题 |
         正确：${stats.correct} |
         错误：${stats.wrong} |
         正确率：${rate}%`;
}

function saveProgress(){
    localStorage.setItem("quiz_stats", JSON.stringify(stats));
    localStorage.setItem("quiz_current", current);
    localStorage.setItem("quiz_wrong", JSON.stringify(wrongList));
}

function loadSavedProgress(){
    const s = localStorage.getItem("quiz_stats");
    const c = localStorage.getItem("quiz_current");
    const w = localStorage.getItem("quiz_wrong");

    if(s) stats = JSON.parse(s);
    if(c) current = parseInt(c);
    if(w) wrongList = JSON.parse(w);
}

function resetProgress(){
    localStorage.clear();
    location.reload();
}

</script>

</body>
</html>
