<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>本地刷题系统</title>

<style>
body{
    max-width:900px;
    margin:40px auto;
    font-family:Arial;
    padding:20px;
}
h2{margin-bottom:10px}
#progress{margin-bottom:10px;font-weight:bold}
.option{
    border:1px solid #ccc;
    padding:10px;
    margin:8px 0;
    cursor:pointer;
    border-radius:6px;
}
.option:hover{background:#f0f0f0}
.correct{background:#c8f7c5 !important}
.wrong{background:#f7c5c5 !important}
button{
    padding:8px 14px;
    margin:5px;
}
#stats{
    margin-top:15px;
    padding:10px;
    background:#f8f8f8;
}
</style>
</head>

<body>

<h2>刷题系统</h2>

<div id="progress"></div>
<div id="question"></div>
<div id="options"></div>

<div>
<button onclick="prev()">上一题</button>
<button onclick="next()">下一题</button>
<button onclick="toggleRandom()">随机模式</button>
<button onclick="showWrong()">错题模式</button>
<button onclick="resetProgress()">重置记录</button>
</div>

<div id="stats"></div>

<script>

let questions = [];
let current = 0;
let randomMode = false;
let wrongList = [];

let stats = {
    total:0,
    correct:0,
    wrong:0
};

fetch("题库_整理版.txt")
.then(res => res.text())
.then(text => {
    parseQuestions(text);
    loadSavedProgress();
    loadQuestion();
});

function parseQuestions(text){
    const blocks = text.split(/\n(?=\d+\.)/);

    blocks.forEach(block=>{
        const lines = block.trim().split("\n");
        if(lines.length < 2) return;

        let title = "";
        let options = {};
        let answer = "";

        for(let line of lines){
            line = line.trim();

            if(/^\d+\./.test(line)) continue;

            if(/^A\./.test(line)) options.A = line.substring(2).trim();
            else if(/^B\./.test(line)) options.B = line.substring(2).trim();
            else if(/^C\./.test(line)) options.C = line.substring(2).trim();
            else if(/^D\./.test(line)) options.D = line.substring(2).trim();
            else if(line.startsWith("答案")){
                const match = line.match(/[A-D]+/);
                if(match) answer = match[0];
            }else{
                title += line + " ";
            }
        }

        if(title && Object.keys(options).length > 0){
            questions.push({title, options, answer});
        }
    });

    stats.total = questions.length;
}

function loadQuestion(){
    if(questions.length === 0) return;

    if(randomMode){
        current = Math.floor(Math.random() * questions.length);
    }

    const q = questions[current];

    document.getElementById("progress").innerText =
        `第 ${current+1} 题 / 共 ${questions.length} 题`;

    document.getElementById("question").innerText = q.title;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    for(let key in q.options){
        const div = document.createElement("div");
        div.className = "option";
        div.innerText = key + ". " + q.options[key];
        div.onclick = ()=>checkAnswer(div,key);
        optionsDiv.appendChild(div);
    }

    updateStats();
}

function checkAnswer(el,selected){
    const q = questions[current];
    const correct = q.answer;

    const opts = document.querySelectorAll(".option");
    opts.forEach(o=>{
        o.onclick=null;
        if(correct.includes(o.innerText[0])){
            o.classList.add("correct");
        }
    });

    if(correct.includes(selected)){
        stats.correct++;
    }else{
        el.classList.add("wrong");
        stats.wrong++;
        wrongList.push(current);
    }

    saveProgress();
    updateStats();
}

function next(){
    if(current < questions.length-1){
        current++;
        loadQuestion();
    }
}

function prev(){
    if(current > 0){
        current--;
        loadQuestion();
    }
}

function toggleRandom(){
    randomMode = !randomMode;
    alert("随机模式：" + (randomMode?"开启":"关闭"));
}

function showWrong(){
    if(wrongList.length === 0){
        alert("暂无错题");
        return;
    }
    current = wrongList.shift();
    loadQuestion();
}

function updateStats(){
    let rate = stats.total ? 
        ((stats.correct/(stats.correct+stats.wrong))*100 || 0).toFixed(1)
        : 0;

    document.getElementById("stats").innerHTML =
        `已做：${stats.correct+stats.wrong} 题 |
         正确：${stats.correct} |
         错误：${stats.wrong} |
         正确率：${rate}%`;
}

function saveProgress(){
    localStorage.setItem("quiz_stats", JSON.stringify(stats));
    localStorage.setItem("quiz_current", current);
    localStorage.setItem("quiz_wrong", JSON.stringify(wrongList));
}

function loadSavedProgress(){
    const s = localStorage.getItem("quiz_stats");
    const c = localStorage.getItem("quiz_current");
    const w = localStorage.getItem("quiz_wrong");

    if(s) stats = JSON.parse(s);
    if(c) current = parseInt(c);
    if(w) wrongList = JSON.parse(w);
}

function resetProgress(){
    localStorage.clear();
    location.reload();
}

</script>

</body>
</html>
