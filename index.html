<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>在线刷题</title>

<script src="https://cdn.jsdelivr.net/npm/mammoth/mammoth.browser.min.js"></script>

<style>
body{font-family:Arial;background:#f3f4f6}
.container{
width:720px;
margin:80px auto;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 4px 20px rgba(0,0,0,0.08)
}
h1{text-align:center}
.option{
border:1px solid #ddd;
padding:12px;
margin:10px 0;
border-radius:6px;
cursor:pointer
}
.option:hover{background:#f5f5f5}
.correct{background:#b7e4b7}
.wrong{background:#f3b2b2}
button{margin-top:20px;padding:8px 16px}
</style>
</head>

<body>

<div class="container">

<h1>在线刷题</h1>

<div id="progress"></div>
<h3 id="question">题库加载中...</h3>
<div id="options"></div>

<button onclick="nextQuestion()">下一题</button>

</div>

<script>

let questions=[]
let current=0

fetch("nisp.docx")
.then(res=>res.arrayBuffer())
.then(arrayBuffer=>{
return mammoth.extractRawText({arrayBuffer:arrayBuffer})
})
.then(result=>{
parseQuestions(result.value)
})

function clean(text){
return text
.replace(/你的答案是.*?分/g,"")
.replace(/展开解析/g,"")
.replace(/^[A-D]\s*/,"")
.trim()
}

function parseQuestions(text){

let lines=text.split("\n").map(v=>v.trim()).filter(v=>v)

let q=null

lines.forEach(line=>{

line=clean(line)

if(line.match(/^\d+/)){

if(q)questions.push(q)

q={
question:line.replace(/^\d+/,""),
options:[],
answer:0
}

}else if(line.match(/^[A-D]/)){

q.options.push(line.replace(/^[A-D][\.、]/,""))

}else if(line.includes("答案")){

let a=line.replace(/[^A-D]/g,"")
q.answer=a.charCodeAt(0)-65

}

})

if(q)questions.push(q)

showQuestion()

}

function showQuestion(){

let q=questions[current]

document.getElementById("progress").innerText=
"第 "+(current+1)+" 题 / 共 "+questions.length+" 题"

document.getElementById("question").innerText=q.question

let html=""

q.options.forEach((opt,i)=>{

html+=`
<div class="option" onclick="choose(${i})">
${String.fromCharCode(65+i)}. ${opt}
</div>
`

})

document.getElementById("options").innerHTML=html

}

function choose(i){

let q=questions[current]
let options=document.querySelectorAll(".option")

if(i===q.answer){

options[i].classList.add("correct")

setTimeout(()=>{nextQuestion()},600)

}else{

options[i].classList.add("wrong")
options[q.answer].classList.add("correct")

}

}

function nextQuestion(){

current++

if(current>=questions.length){
alert("题做完了")
current=0
}

showQuestion()

}

</script>

</body>
</html>
